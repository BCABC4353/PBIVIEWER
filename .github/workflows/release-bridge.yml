name: Release Bridge

# Lets the repo's automation (Claude sessions) start a release WITHOUT the
# Actions-dispatch API permission integrations lack: pushing a change to
# RELEASE_REQUEST on main dispatches the existing Build and Release pipeline.
# Humans can keep using the Actions tab button — this is an additional door,
# not a replacement.
on:
  push:
    branches: [main]
    paths: ['RELEASE_REQUEST']

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Read requested bump and dispatch Build and Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BUMP=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/RELEASE_REQUEST?ref=main" \
            | python3 -c "import sys,json,base64;print(base64.b64decode(json.load(sys.stdin)['content']).decode().strip().split('\n')[0] or 'patch')")
          case "$BUMP" in patch|minor|major) ;; *) BUMP=patch ;; esac
          echo "Dispatching Build and Release with bump=$BUMP"
          gh workflow run build.yml -f bump="$BUMP" --repo "${{ github.repository }}"
