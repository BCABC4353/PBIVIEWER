name: CI

on:
  pull_request:
  push:
    branches: [master, main]

# NEW-CI-6: cancel any in-flight run for the same ref/PR so overlapping pushes
# don't queue and race. pull_request events use the PR number; push events on a
# branch use the branch name. The workflow name is included so ci.yml and
# build.yml each have their own independent concurrency namespace.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate config
        run: npm run generate-config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Type check
        run: npx tsc -p tsconfig.main.json --noEmit && npx tsc -p tsconfig.renderer.json --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Audit dependencies (report-only)
        run: npm audit --audit-level=high || true
        continue-on-error: true
