name: Build and Release

# ----------------------------------------------------------------------------
# ONE-CLICK BUILD - works from your desktop OR your phone, no terminal needed.
#
#   GitHub.com (or the GitHub mobile app)
#     -> this repo -> "Actions" tab
#     -> "Build and Release" (left side)
#     -> "Run workflow" -> pick patch / minor / major -> Run
#
# GitHub bumps the version for you, builds the Windows + Mac installers, and
# publishes a Release with both attached. No tags, no version editing, no CLI.
# (The version bump + tag happen on GitHub's runner, so it works even when a
# phone / cloud session can't push tags itself.)
# ----------------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump: patch = small fix, minor = new feature, major = big change'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

# One build/release at a time; never silently cancel one that's mid-flight.
concurrency:
  group: build-and-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # 1) Bump version in package.json, commit to main, and create the tag.
  #    Runs on GitHub's runner (not your phone), so the tag push always works.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Bump version, commit and tag
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          new=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${new#v}" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "release ${new}"
          git tag "${new}"
          git push origin main
          git push origin "${new}"

  build-windows:
    needs: version
    runs-on: windows-latest
    steps:
      - name: Checkout the new version
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_platform: win32
          npm_config_arch: x64
      - name: Generate config
        run: npm run generate-config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - name: Type check
        run: npx tsc --noEmit -p tsconfig.main.json && npx tsc --noEmit -p tsconfig.renderer.json
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:coverage
      - name: Build and package Windows
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build-output/*.exe
          retention-days: 30

  build-mac:
    needs: version
    runs-on: macos-latest
    env:
      # GitHub's release CDN intermittently 504s on the Electron darwin binary
      # (it blocked the v2.0.7 AND v2.0.8 mac builds for minutes at a time). Pull
      # Electron from the npmmirror mirror instead; @electron/get still verifies
      # SHASUMS256, so binary integrity is preserved. ELECTRON_CUSTOM_DIR drops
      # the leading "v" so the mirror's /mirrors/electron/<version>/ path resolves.
      ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      ELECTRON_CUSTOM_DIR: "{{ version }}"
    steps:
      - name: Checkout the new version
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.version.outputs.version }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Ensure Electron binary is installed (retry transient CDN 504s)
        run: |
          attempt=1
          max=4
          until node node_modules/electron/install.js; do
            if [ "$attempt" -ge "$max" ]; then
              echo "electron binary download failed after $attempt attempts"
              exit 1
            fi
            echo "electron download attempt $attempt failed; retrying in 15s..."
            attempt=$((attempt + 1))
            sleep 15
          done
      - name: Generate config
        run: npm run generate-config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - name: Type check
        run: npx tsc --noEmit -p tsconfig.main.json && npx tsc --noEmit -p tsconfig.renderer.json
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test:coverage
      - name: Build and package macOS
        run: |
          attempt=1
          max=3
          until npm run package:mac; do
            if [ "$attempt" -ge "$max" ]; then
              echo "package:mac failed after $attempt attempts"
              exit 1
            fi
            echo "package:mac attempt $attempt failed; retrying in 15s..."
            attempt=$((attempt + 1))
            sleep 15
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: build-output/*.zip
          retention-days: 30

  release:
    needs: [version, build-windows, build-mac]
    # Publish as long as the Windows build succeeded, even if the macOS job failed
    # (e.g. a transient Electron-CDN 504). One platform's flake must never block
    # the whole release. always() lets this run despite a failed or skipped need.
    if: ${{ always() && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts
      - name: Download macOS installer
        uses: actions/download-artifact@v4
        # Tolerate a missing mac artifact so a failed mac build still lets the
        # Windows installer publish rather than zeroing out the whole release.
        continue-on-error: true
        with:
          name: mac-installer
          path: ./artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          files: ./artifacts/*
          generate_release_notes: true
          draft: false
          make_latest: true
