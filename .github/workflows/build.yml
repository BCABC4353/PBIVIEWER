name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# NEW-CI-6: prevent duplicate tag-push runs from racing. cancel-in-progress is
# false because a partially-built release should not be silently discarded — the
# operator needs to see the failure, not a silent cancellation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version v$pkg" >&2
            exit 1
          fi
          echo "Tag and package.json version both v$tag"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          npm_config_platform: win32
          npm_config_arch: x64

      # Audit gate kept report-only — 6 HIGH vulns remain that require major-version
      # upgrades (electron-builder, msal-node, vite, electron). Sprint 3 follow-up
      # will land those upgrades, then this gate flips to hard.
      - name: Audit dependencies (report-only)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Generate config
        run: npm run generate-config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.main.json && npx tsc --noEmit -p tsconfig.renderer.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build and package Windows
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build-output/*.exe
          retention-days: 30

  build-mac:
    # macos-latest is fine because we build a ZIP (not a DMG), so the arm64/APFS
    # hdiutil bug (electron-builder #9155) doesn't apply. ZIP creation needs no
    # hdiutil and works on any macOS runner.
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "Tag v$tag does not match package.json version v$pkg" >&2
            exit 1
          fi
          echo "Tag and package.json version both v$tag"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Audit gate kept report-only — 6 HIGH vulns remain that require major-version
      # upgrades (electron-builder, msal-node, vite, electron). Sprint 3 follow-up
      # will land those upgrades, then this gate flips to hard.
      - name: Audit dependencies (report-only)
        run: npm audit --audit-level=high || true
        continue-on-error: true

      - name: Generate config
        run: npm run generate-config
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.main.json && npx tsc --noEmit -p tsconfig.renderer.json

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:coverage

      - name: Build and package macOS
        run: |
          attempt=1
          max=3
          until npm run package:mac; do
            if [ "$attempt" -ge "$max" ]; then
              echo "package:mac failed after $attempt attempts"
              exit 1
            fi
            echo "package:mac attempt $attempt failed; retrying in 15s..."
            attempt=$((attempt + 1))
            sleep 15
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: build-output/*.zip
          retention-days: 30

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: ./artifacts

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: mac-installer
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true
          draft: true
