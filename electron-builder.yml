appId: com.bcabc.powerbi-viewer
productName: Power BI Viewer
copyright: Copyright © 2024-2026

publish:
  provider: github
  owner: BCABC4353
  repo: PBIVIEWER

directories:
  output: build-output
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

extraResources:
  - from: docs/manual
    to: manual
    filter:
      - PowerBI-Viewer-User-Guide.html
      - screenshots/*.png

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icons/icon.ico
  artifactName: PowerBI-Viewer-${version}-Windows-Setup.${ext}
  verifyUpdateCodeSignature: false

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico
  installerHeaderIcon: assets/icons/icon.ico
  deleteAppDataOnUninstall: false

mac:
  target:
    - target: zip
      arch:
        - x64
        - arm64
  icon: assets/icons/icon.icns
  artifactName: ${productName}-${version}-Mac-${arch}.${ext}
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "-"
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false  # Set to true when you have Apple Developer credentials

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  window:
    width: 540
    height: 380
